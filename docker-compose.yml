version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: plume-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: plume-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: plume-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672" # Management UI

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: plume-api-gateway
    restart: always
    env_file:
      - .env
    ports:
      - "${API_GATEWAY_PORT}:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - user
      - tweet
      - notification
      - comment
      - auth
      - follow
      - like
      - feed

  user:
    build:
      context: ./services/user
    container_name: plume-user
    env_file:
      - .env
    ports:
      - "${USER_PORT}:8001"
    depends_on:
      - postgres
      - redis

  tweet:
    build:
      context: ./services/tweet
    container_name: plume-tweet
    env_file:
      - .env
    ports:
      - "${TWEET_PORT}:8004"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  notification:
    build:
      context: ./services/notification
    container_name: plume-notification
    env_file:
      - .env
    ports:
      - "${NOTIFICATION_PORT}:8002"
    depends_on:
      - postgres
      - rabbitmq

  comment:
    build:
      context: ./services/comment
    container_name: plume-comment
    env_file:
      - .env
    ports:
      - "${COMMENT_PORT}:8003"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  auth:
    build:
      context: ./services/auth
    container_name: plume-auth
    env_file:
      - .env
    ports:
      - "${AUTH_PORT}:8005"
    depends_on:
      - postgres
      - redis

  follow:
    build:
      context: ./services/follow
    container_name: plume-follow
    env_file:
      - .env
    ports:
      - "${FOLLOW_PORT}:8006"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  like:
    build:
      context: ./services/like
    container_name: plume-like
    env_file:
      - .env
    ports:
      - "${LIKE_PORT}:8007"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  feed:
    build:
      context: ./services/feed
    container_name: plume-feed
    env_file:
      - .env
    ports:
      - "${FEED_PORT}:8008"
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  pgdata:
  redisdata:
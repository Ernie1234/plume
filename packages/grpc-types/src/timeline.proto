syntax = "proto3";
package plume.timeline;

service TimelineService {
  rpc GetHomeTimeline (GetTimelineRequest) returns (TimelineResponse);
}

message GetTimelineRequest {
  string user_id = 1;
  optional string cursor = 2;
  int32 limit = 3;
}

// Maps to the FeedItem TS interface
message FeedItem {
  string tweet_id = 1;
  string author_id = 2;
  double score = 3;
  string added_at = 4;
}

message TimelineResponse {
  repeated FeedItem items = 1; // Updated to use the rich FeedItem object
  string next_cursor = 2;
}
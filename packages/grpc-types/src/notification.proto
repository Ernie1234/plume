syntax = "proto3";

package plume.notification;

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse);
}

// --- Enums ---
enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_LIKE = 1;
  NOTIFICATION_TYPE_RETWEET = 2;
  NOTIFICATION_TYPE_REPLY = 3;
  NOTIFICATION_TYPE_FOLLOW = 4;
  NOTIFICATION_TYPE_MENTION = 5;
  NOTIFICATION_TYPE_QUOTE = 6;
  NOTIFICATION_TYPE_NEW_TWEET = 7;
}

// --- Messages ---
message Notification {
  string id = 1;
  NotificationType type = 2; // Updated to Enum
  string recipient_id = 3;
  string actor_id = 4;
  optional string tweet_id = 5;
  bool is_read = 6;
  string created_at = 7;
  string message = 8; // Added from TS NotificationPayload
}

message SendNotificationRequest {
  NotificationType type = 1; // Updated to Enum
  string recipient_id = 2;
  string actor_id = 3;
  optional string tweet_id = 4;
  string message = 5; // Added
}

message SendNotificationResponse {
  bool success = 1;
  string notification_id = 2;
}

message GetNotificationsRequest {
  string user_id = 1;
  optional string cursor = 2;
  int32 limit = 3;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  optional string next_cursor = 2;
  bool has_more = 3;
}

message MarkAsReadRequest {
  string user_id = 1;
  repeated string notification_ids = 2;
}

message MarkAsReadResponse {
  bool success = 1;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message GetUnreadCountResponse {
  int32 count = 1;
}